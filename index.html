<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Task Manager Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            transition: background 0.3s ease;
        }

        /* Dark Mode */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .container {
            background: #1e1e2e;
            color: #eee;
        }

        body.dark-mode .task-input input {
            background: #2d2d3d;
            color: #eee;
            border-color: #3d3d4d;
        }

        body.dark-mode .task-list li {
            border-bottom-color: #3d3d4d;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        /* Header with dark mode toggle */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dark-mode-btn {
            background: #667eea;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .dark-mode-btn:hover {
            transform: scale(1.05);
        }

        /* Task Input Area */
        .task-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .task-input input, .task-input select {
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .task-input input:focus, .task-input select:focus {
            outline: none;
            border-color: #667eea;
        }

        #taskInput {
            flex: 2;
            min-width: 150px;
        }

        #dueDate, #prioritySelect {
            flex: 1;
            min-width: 100px;
        }

        #addTaskBtn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #addTaskBtn:hover {
            transform: scale(1.02);
        }

        /* Filter Buttons */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Task Stats */
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        body.dark-mode .stats {
            background: #2d2d3d;
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Task List */
        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
            border-radius: 10px;
        }

        .task-list li:hover {
            background: #f8f9fa;
        }

        body.dark-mode .task-list li:hover {
            background: #2d2d3d;
        }

        .task-list li.completed span.task-text {
            text-decoration: line-through;
            color: #999;
        }

        /* Priority badges */
        .priority-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .priority-high { background: #ff4444; color: white; }
        .priority-medium { background: #ffaa44; color: white; }
        .priority-low { background: #44aa44; color: white; }

        .due-date {
            font-size: 0.7rem;
            color: #999;
            margin-left: 0.5rem;
        }

        .due-date.overdue {
            color: #ff4444;
            font-weight: bold;
        }

        .task-text {
            flex: 1;
            cursor: pointer;
        }

        .edit-btn, .delete-btn {
            padding: 0.25rem 0.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .edit-btn {
            background: #44aaff;
            color: white;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            opacity: 0.8;
        }

        /* Edit mode */
        .edit-input {
            flex: 1;
            padding: 0.25rem;
            font-size: 1rem;
        }

        /* Scrollbar */
        .task-list::-webkit-scrollbar {
            width: 8px;
        }

        .task-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Task Manager Pro</h1>
            <button class="dark-mode-btn" id="darkModeToggle">🌙 Dark</button>
        </div>

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="What needs to be done?">
            <input type="date" id="dueDate">
            <select id="prioritySelect">
                <option value="low">🟢 Low Priority</option>
                <option value="medium">🟡 Medium Priority</option>
                <option value="high">🔴 High Priority</option>
            </select>
            <button id="addTaskBtn">+ Add Task</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat">📊 Total: <span id="totalCount">0</span></div>
            <div class="stat">🟢 Active: <span id="activeCount">0</span></div>
            <div class="stat">✅ Completed: <span id="completedCount">0</span></div>
        </div>

        <ul class="task-list" id="taskList">
            <li style="color: #999; text-align: center;">✨ Add your first task above!</li>
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
