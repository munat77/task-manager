<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 1.5rem;
        }
        .task-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .task-input input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .task-input button {
            padding: 0.75rem 1.5rem;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .task-list {
            list-style: none;
        }
        .task-list li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-bottom: 1px solid #eee;
        }
        .task-list li.completed span {
            text-decoration: line-through;
            color: #999;
        }
        .delete-btn {
            margin-left: auto;
            background: #ff4444;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .filters button {
            padding: 0.5rem 1rem;
            border: none;
            background: #eee;
            cursor: pointer;
            border-radius: 8px;
        }
        .filters button.active {
            background: #0066ff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Task Manager</h1>
        
        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="task-list" id="taskList">
            <li style="color: #999; text-align: center;">No tasks yet. Add one above!</li>
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
